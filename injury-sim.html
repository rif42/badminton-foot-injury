<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badminton Injury Simulation (Clean)</title>
    <style>
        :root {
            --bg: #0f1115;
            --panel: #171a21;
            --panel-2: #1e2330;
            --text: #e8ecf1;
            --muted: #9aa7b3;
            --ok: #4cd07a;
            --warn: #ffb020;
            --bad: #ff5c5c;
            --hip: #66b3ff;
            --shin: #b08cff;
            --foot: #f2f2f2;
            --grid: #2a3140;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        .app {
            display: grid;
            grid-template-columns: 340px 1fr;
            height: 100%;
        }

        .sidebar {
            background: var(--panel);
            border-right: 1px solid #2a3140;
            padding: 16px;
            overflow: auto;
        }

        .canvas-wrap {
            position: relative;
            background: radial-gradient(1200px 600px at 60% 20%, #1a2030, #0f1115);
        }

        #viz3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 18px;
        }

        p.note {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.4;
        }

        .control {
            margin-bottom: 14px;
        }

        .control label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
            color: var(--text);
        }

        .value {
            color: var(--muted);
        }

        input[type="range"] {
            width: 100%;
        }

        .row {
            display: flex;
            gap: 8px;
        }

        button {
            background: var(--panel-2);
            border: 1px solid #303a50;
            color: var(--text);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
        }

        button:hover {
            border-color: #3a4864;
        }

        .status {
            margin-top: 14px;
            padding: 10px 12px;
            border-radius: 10px;
            font-weight: 600;
            border: 1px solid #2e3647;
            background: #131823;
        }

        .hud {
            margin-top: 12px;
            display: grid;
            gap: 8px;
        }

        .hud-item {
            border: 1px solid #2e3647;
            border-radius: 10px;
            background: #131823;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 13px;
        }

        .ok {
            color: var(--ok);
        }

        .warn {
            color: var(--warn);
        }

        .bad {
            color: var(--bad);
        }

        .legend {
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px dashed #2e3647;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }
    </style>
</head>

<body>
    <div class="app">
        <aside class="sidebar">
            <h1>Badminton Biomechanics</h1>
            <p class="note">Clean simulation file. Same core sliders + warnings, no host/injected scripts.</p>

            <div class="control">
                <label for="hipTrajectory">Hip Trajectory (°) <span id="hipTrajectoryVal" class="value">0</span></label>
                <input id="hipTrajectory" type="range" min="-45" max="90" value="0" step="1" />
            </div>

            <div class="control">
                <label for="kneeFlexion">Knee Flexion (°) <span id="kneeFlexionVal" class="value">178</span></label>
                <input id="kneeFlexion" type="range" min="70" max="179" value="178" step="1" />
            </div>

            <div class="control">
                <label for="footAlignment">Foot Alignment (°) <span id="footAlignmentVal" class="value">0</span></label>
                <input id="footAlignment" type="range" min="0" max="45" value="0" step="1" />
            </div>

            <div class="control">
                <label for="strikePitch">Landing Pitch (°) <span id="strikePitchVal" class="value">0</span></label>
                <input id="strikePitch" type="range" min="-20" max="20" value="0" step="1" />
            </div>

            <div class="control">
                <label for="riskProfile">Risk Profile <span id="riskProfileVal" class="value">Balanced</span></label>
                <select id="riskProfile" style="width:100%; background:var(--panel-2); color:var(--text); border:1px solid #303a50; border-radius:8px; padding:8px;">
                    <option value="conservative">Conservative</option>
                    <option value="balanced" selected>Balanced</option>
                    <option value="aggressive">Aggressive</option>
                </select>
            </div>

            <div class="row">
                <button id="resetBtn" type="button">Reset Posture</button>
            </div>

            <div id="status" class="status">✅ Form Optimal</div>

            <div id="hud" class="hud"></div>

            <div class="legend">
                H = Hip, K = Knee, A = Ankle.<br />
                Risk now uses weighted + interaction score (0-100).<br />
                Tune all configs in script: <code>RISK_PROFILES</code> (curves, weights, interactions, bands).
            </div>
        </aside>

        <main class="canvas-wrap">
            <div id="viz3d"></div>
        </main>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.161.0/build/three.module.js"
        }
      }
    </script>
    <script type="module">
        import * as THREE from 'three';

        const state = {
            hipTrajectory: 0,
            kneeFlexion: 178,
            footAlignment: 0,
            strikePitch: 0,
        };

        const els = {
            hipTrajectory: document.getElementById('hipTrajectory'),
            kneeFlexion: document.getElementById('kneeFlexion'),
            footAlignment: document.getElementById('footAlignment'),
            strikePitch: document.getElementById('strikePitch'),
            riskProfile: document.getElementById('riskProfile'),
            hipTrajectoryVal: document.getElementById('hipTrajectoryVal'),
            kneeFlexionVal: document.getElementById('kneeFlexionVal'),
            footAlignmentVal: document.getElementById('footAlignmentVal'),
            strikePitchVal: document.getElementById('strikePitchVal'),
            riskProfileVal: document.getElementById('riskProfileVal'),
            resetBtn: document.getElementById('resetBtn'),
            status: document.getElementById('status'),
            hud: document.getElementById('hud'),
            viz3d: document.getElementById('viz3d'),
        };

        function toRad(deg) { return (deg * Math.PI) / 180; }
        function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }

        // =========================================================
        // RISK MODEL CONFIG (PRIMARY TUNING SECTION)
        // =========================================================
        // RISK_PROFILES define all tuneable configs per profile:
        // - curves: piecewise risk map for each parameter (x -> normalized r in [0..1])
        // - weights: relative base contribution
        // - interactions: pair synergy bonuses
        // - bands: final status color bands

        const RISK_PROFILES = {
            conservative: {
                label: 'Conservative',
                curves: {
                    hipTrajectory: [
                        { max: 4.999, r: 0.8 },
                        { max: 14.999, r: 0.55 },
                        { max: 24.999, r: 0.25 },
                        { max: Infinity, r: 0.05 },
                    ],
                    kneeFlexion: [
                        { max: 145, r: 0.05 },
                        { max: 155, r: 0.25 },
                        { max: 165, r: 0.6 },
                        { max: Infinity, r: 0.9 },
                    ],
                    footAlignment: [
                        { max: 8, r: 0.05 },
                        { max: 16, r: 0.3 },
                        { max: 24, r: 0.65 },
                        { max: Infinity, r: 0.9 },
                    ],
                    strikePitch: [
                        { min: 0.001, r: 0.05 },
                        { min: -3, r: 0.35 },
                        { min: -8, r: 0.7 },
                        { min: -Infinity, r: 0.9 },
                    ],
                },
                weights: { hipTrajectory: 0.15, kneeFlexion: 0.35, footAlignment: 0.25, strikePitch: 0.25 },
                interactions: { knee_x_hip: 14, foot_x_pitch: 14, knee_x_pitch: 10, hip_x_foot: 8 },
                bands: { greenMax: 24, yellowMax: 49 },
            },
            balanced: {
                label: 'Balanced',
                curves: {
                    hipTrajectory: [
                        { max: -0.001, r: 0.8 },
                        { max: 9.999, r: 0.55 },
                        { max: 19.999, r: 0.25 },
                        { max: Infinity, r: 0.05 },
                    ],
                    kneeFlexion: [
                        { max: 150, r: 0.05 },
                        { max: 160, r: 0.25 },
                        { max: 170, r: 0.6 },
                        { max: Infinity, r: 0.9 },
                    ],
                    footAlignment: [
                        { max: 10, r: 0.05 },
                        { max: 20, r: 0.3 },
                        { max: 30, r: 0.65 },
                        { max: Infinity, r: 0.9 },
                    ],
                    strikePitch: [
                        { min: 0.001, r: 0.05 },
                        { min: -5, r: 0.35 },
                        { min: -10, r: 0.7 },
                        { min: -Infinity, r: 0.9 },
                    ],
                },
                weights: { hipTrajectory: 0.15, kneeFlexion: 0.35, footAlignment: 0.25, strikePitch: 0.25 },
                interactions: { knee_x_hip: 12, foot_x_pitch: 12, knee_x_pitch: 8, hip_x_foot: 6 },
                bands: { greenMax: 29, yellowMax: 59 },
            },
            aggressive: {
                label: 'Aggressive',
                curves: {
                    hipTrajectory: [
                        { max: -5.001, r: 0.8 },
                        { max: 4.999, r: 0.55 },
                        { max: 14.999, r: 0.25 },
                        { max: Infinity, r: 0.05 },
                    ],
                    kneeFlexion: [
                        { max: 155, r: 0.05 },
                        { max: 165, r: 0.25 },
                        { max: 175, r: 0.6 },
                        { max: Infinity, r: 0.9 },
                    ],
                    footAlignment: [
                        { max: 12, r: 0.05 },
                        { max: 24, r: 0.3 },
                        { max: 34, r: 0.65 },
                        { max: Infinity, r: 0.9 },
                    ],
                    strikePitch: [
                        { min: 2, r: 0.05 },
                        { min: -7, r: 0.35 },
                        { min: -12, r: 0.7 },
                        { min: -Infinity, r: 0.9 },
                    ],
                },
                weights: { hipTrajectory: 0.15, kneeFlexion: 0.35, footAlignment: 0.25, strikePitch: 0.25 },
                interactions: { knee_x_hip: 10, foot_x_pitch: 10, knee_x_pitch: 6, hip_x_foot: 4 },
                bands: { greenMax: 34, yellowMax: 69 },
            },
        };

        let activeProfileKey = 'balanced';

        function getActiveProfile() {
            return RISK_PROFILES[activeProfileKey] || RISK_PROFILES.balanced;
        }

        // =========================================================
        // RISK MODEL CALCULATION (SECONDARY TUNING/LOGIC SECTION)
        // =========================================================
        function evalPiecewiseByMax(value, curve) {
            for (const p of curve) {
                if (value <= p.max) return p.r;
            }
            return curve[curve.length - 1].r;
        }

        function evalPiecewiseByMin(value, curve) {
            for (const p of curve) {
                if (value >= p.min) return p.r;
            }
            return curve[curve.length - 1].r;
        }

        function riskLevelFromNormalized(r) {
            if (r >= 0.7) return { txt: 'High', cls: 'bad' };
            if (r >= 0.35) return { txt: 'Moderate', cls: 'warn' };
            return { txt: 'Low', cls: 'ok' };
        }

        function computeRiskBreakdown() {
            const profile = getActiveProfile();
            const curves = profile.curves;
            const weights = profile.weights;
            const interactions = profile.interactions;

            const sHip = evalPiecewiseByMax(state.hipTrajectory, curves.hipTrajectory);
            const sKnee = evalPiecewiseByMax(state.kneeFlexion, curves.kneeFlexion);
            const sFoot = evalPiecewiseByMax(state.footAlignment, curves.footAlignment);
            const sPitch = evalPiecewiseByMin(state.strikePitch, curves.strikePitch);

            const baseScore = 100 * (
                weights.hipTrajectory * sHip +
                weights.kneeFlexion * sKnee +
                weights.footAlignment * sFoot +
                weights.strikePitch * sPitch
            );

            const interactionScore =
                interactions.knee_x_hip * (sKnee * sHip) +
                interactions.foot_x_pitch * (sFoot * sPitch) +
                interactions.knee_x_pitch * (sKnee * sPitch) +
                interactions.hip_x_foot * (sHip * sFoot);

            const totalRisk = clamp(baseScore + interactionScore, 0, 100);

            return {
                totalRisk,
                baseScore,
                interactionScore,
                normalized: { sHip, sKnee, sFoot, sPitch },
            };
        }

        function getSafetyStatus() {
            const breakdown = computeRiskBreakdown();
            const n = breakdown.normalized;
            const alerts = [];

            const hipLevel = riskLevelFromNormalized(n.sHip);
            alerts.push({ label: 'Hip Control', value: hipLevel.txt, cls: hipLevel.cls });

            const kneeLevel = riskLevelFromNormalized(n.sKnee);
            alerts.push({ label: 'Knee Overload', value: kneeLevel.txt, cls: kneeLevel.cls });

            const footLevel = riskLevelFromNormalized(n.sFoot);
            alerts.push({ label: 'Foot Alignment', value: footLevel.txt, cls: footLevel.cls });

            const pitchLevel = riskLevelFromNormalized(n.sPitch);
            alerts.push({ label: 'Kinetic Shock', value: pitchLevel.txt, cls: pitchLevel.cls });

            alerts.push({ label: 'Base Score', value: breakdown.baseScore.toFixed(1), cls: 'warn' });
            alerts.push({ label: 'Interaction Bonus', value: `+${breakdown.interactionScore.toFixed(1)}`, cls: 'warn' });
            alerts.push({ label: 'Total Risk (0-100)', value: breakdown.totalRisk.toFixed(1), cls: 'bad' });

            return { alerts, breakdown };
        }

        function setStatus() {
            const { totalRisk } = computeRiskBreakdown();
            const bands = getActiveProfile().bands;

            if (totalRisk <= bands.greenMax) {
                els.status.textContent = `✅ Form Optimal — Risk ${totalRisk.toFixed(1)}`;
                els.status.style.color = 'var(--ok)';
                return;
            }

            if (totalRisk <= bands.yellowMax) {
                els.status.textContent = `⚠️ Caution Zone — Risk ${totalRisk.toFixed(1)}`;
                els.status.style.color = 'var(--warn)';
                return;
            }

            els.status.textContent = `⛔ High Injury Risk — Risk ${totalRisk.toFixed(1)}`;
            els.status.style.color = 'var(--bad)';
        }

        function renderHUD() {
            const { alerts } = getSafetyStatus();
            els.hud.innerHTML = alerts.map(a => `
        <div class="hud-item">
          <span>${a.label}</span>
          <strong class="${a.cls}">${a.value}</strong>
        </div>
      `).join('');
        }

        // --- 3D scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f1115);

        const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
        camera.position.set(2.5, 1.8, 3.6);
        camera.lookAt(0, 0.8, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio || 1);
        els.viz3d.appendChild(renderer.domElement);

        const hemi = new THREE.HemisphereLight(0xbfd8ff, 0x1a1f2a, 1.0);
        scene.add(hemi);
        const dir = new THREE.DirectionalLight(0xffffff, 0.85);
        dir.position.set(3, 5, 2);
        scene.add(dir);

        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(10, 10),
            new THREE.MeshStandardMaterial({ color: 0x1a2030, roughness: 0.95, metalness: 0.05 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.35;
        scene.add(ground);

        const grid = new THREE.GridHelper(10, 20, 0x2a3140, 0x2a3140);
        grid.position.y = -0.149;
        scene.add(grid);

        const thighMat = new THREE.MeshStandardMaterial({ color: 0x66b3ff, roughness: 0.5 });
        const shinMat = new THREE.MeshStandardMaterial({ color: 0xb08cff, roughness: 0.5 });
        const footMat = new THREE.MeshStandardMaterial({ color: 0xf2f2f2, roughness: 0.5 });
        const badMat = new THREE.MeshStandardMaterial({ color: 0xff5c5c, roughness: 0.45 });

        const root = new THREE.Group();
        root.position.set(0, 1.1, 0);
        scene.add(root);

        const hip = new THREE.Group();
        hip.position.set(0, 0.1, 0);
        root.add(hip);

        const thigh = new THREE.Mesh(new THREE.CapsuleGeometry(0.055, 0.62, 6, 12), thighMat);
        thigh.position.y = -0.35;
        hip.add(thigh);

        const knee = new THREE.Group();
        knee.position.y = -0.7;
        hip.add(knee);

        const shin = new THREE.Mesh(new THREE.CapsuleGeometry(0.048, 0.58, 6, 12), shinMat);
        shin.position.y = -0.32;
        knee.add(shin);

        const ankle = new THREE.Group();
        ankle.position.y = -0.64;
        knee.add(ankle);

        const foot = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.07, 0.35), footMat);
        foot.position.set(0, -0.03, 0.18);
        ankle.add(foot);

        const impactArrow = new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), new THREE.Vector3(), 0.55, 0xff5c5c, 0.14, 0.08);
        impactArrow.visible = false;
        scene.add(impactArrow);

        function resize3D() {
            const rect = els.viz3d.getBoundingClientRect();
            camera.aspect = rect.width / Math.max(rect.height, 1);
            camera.updateProjectionMatrix();
            renderer.setSize(rect.width, rect.height);
        }

        function updatePose3D() {
            hip.rotation.x = -toRad(state.hipTrajectory);
            knee.rotation.x = toRad(180 - state.kneeFlexion);
            ankle.rotation.x = toRad(state.strikePitch);
            ankle.rotation.y = toRad(state.footAlignment);

            const { normalized } = computeRiskBreakdown();
            const shock = normalized.sPitch >= 0.7;
            foot.material = shock ? badMat : footMat;

            if (shock) {
                const footWorld = new THREE.Vector3();
                foot.getWorldPosition(footWorld);
                impactArrow.position.copy(footWorld.clone().add(new THREE.Vector3(0, -0.05, 0)));
                impactArrow.visible = true;
            } else {
                impactArrow.visible = false;
            }
        }

        function renderScene() {
            updatePose3D();
            renderer.render(scene, camera);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderScene();
        }

        function syncUI() {
            els.hipTrajectoryVal.textContent = state.hipTrajectory;
            els.kneeFlexionVal.textContent = state.kneeFlexion;
            els.footAlignmentVal.textContent = state.footAlignment;
            els.strikePitchVal.textContent = state.strikePitch;
            els.riskProfileVal.textContent = getActiveProfile().label;
            setStatus();
            renderHUD();
            renderScene();
        }

        function bindSlider(key, el) {
            el.addEventListener('input', () => {
                state[key] = Number(el.value);
                syncUI();
            });
        }

        bindSlider('hipTrajectory', els.hipTrajectory);
        bindSlider('kneeFlexion', els.kneeFlexion);
        bindSlider('footAlignment', els.footAlignment);
        bindSlider('strikePitch', els.strikePitch);

        els.riskProfile.addEventListener('change', () => {
            activeProfileKey = els.riskProfile.value;
            syncUI();
        });

        els.resetBtn.addEventListener('click', () => {
            state.hipTrajectory = 0;
            state.kneeFlexion = 178;
            state.footAlignment = 0;
            state.strikePitch = 0;
            activeProfileKey = 'balanced';

            els.hipTrajectory.value = String(state.hipTrajectory);
            els.kneeFlexion.value = String(state.kneeFlexion);
            els.footAlignment.value = String(state.footAlignment);
            els.strikePitch.value = String(state.strikePitch);
            els.riskProfile.value = activeProfileKey;

            syncUI();
        });

        window.addEventListener('resize', () => {
            resize3D();
            renderScene();
        });

        resize3D();
        syncUI();
        animate();
    </script>
</body>

</html>
